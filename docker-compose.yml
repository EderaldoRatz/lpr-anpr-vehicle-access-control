version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: lpr_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_DATABASE: ${DB_NAME:-lpr_anpr_db}
      MYSQL_USER: ${DB_USER:-lpr_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - lpr_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: lpr_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - lpr_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 3s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lpr_backend
    environment:
      DATABASE_URL: mysql+pymysql://${DB_USER:-lpr_user}:${DB_PASSWORD:-password}@mysql:3306/${DB_NAME:-lpr_anpr_db}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-key}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lpr_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lpr_frontend
    environment:
      REACT_APP_API_URL: http://backend:8000/api
      REACT_APP_API_TIMEOUT: 30000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    networks:
      - lpr_network
    command: npm start

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: lpr_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - lpr_network

  # PhpMyAdmin
  phpmyadmin:
    image: phpmyadmin
    container_name: lpr_phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: ${DB_USER:-lpr_user}
      PMA_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - lpr_network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  backend_uploads:
    driver: local
  backend_logs:
    driver: local

networks:
  lpr_network:
    driver: bridge
